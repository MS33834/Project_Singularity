name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 08_Automation/requirements-dev.txt

      - name: Project health check
        run: python 08_Automation/project_health_check.py

      - name: Run tests
        run: pytest

      - name: Lint with black (check only)
        run: black --check 08_Automation tests

      - name: Lint with isort (check only)
        run: isort --check-only 08_Automation tests
